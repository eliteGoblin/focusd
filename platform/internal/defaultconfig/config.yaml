# Default focusd platform configuration.
#
# This file is the canonical reference for which plugins ship with the
# platform and how each is scheduled. A real installation copies this
# to the OS-default config path (see osadapter.DefaultConfigPath) and
# the operator may edit jobs there. Validate against this file with:
#
#   platform validate --config platform/internal/defaultconfig/config.yaml \
#                     --plugin-dir <plugins-root>
#
# run_as on each plugin's manifest determines which run_mode of the
# platform can dispatch it. The scheduler skips jobs whose run_as
# does not match the platform mode (a no-op, not a failure).

platform:
  log_level: info
  # run_mode is left unset: the platform picks user|system based on
  # whether the agent process has root.

jobs:
  - id: dns-block-reconcile
    plugin: dns-block
    enabled: true
    schedule: "@every 10s"
    timeout: 5s
    retry: 0
    allow_overlap: false
    config: {}

  - id: kill-steam-reconcile
    plugin: kill-steam
    enabled: true
    schedule: "@every 10s"
    timeout: 20s
    retry: 0
    allow_overlap: false
    config: {}

  - id: skill-protector-reconcile
    plugin: skill-protector
    enabled: true
    schedule: "@every 5m"
    timeout: 30s
    retry: 0
    allow_overlap: false
    config: {}

  # FEATURE 11: keep the Freedom focus app + its proxy alive (relaunch if the
  # user kills them), best-effort re-enable its login item. run_as current_user
  # (from the plugin manifest). 10s cadence so a killed Freedom comes back fast.
  - id: freedom-protector-reconcile
    plugin: freedom-protector
    enabled: true
    schedule: "@every 10s"
    timeout: 20s
    retry: 0
    allow_overlap: false
    config: {}

  # Enabled by default (baked in): the daemon-managed run path no longer
  # reads any on-disk override, so this job — which used to be turned on via
  # a workdir config.yaml — must ship ON here to stay enforced.
  #
  # The plugin needs these MANUAL host prerequisites to actually populate
  # the pf table (without them the pass is a controlled no-op/failure every
  # 30m, harmless but noisy):
  #   1. /etc/pf.anchors/focusd-block-steam exists with the table + rule
  #   2. /etc/pf.conf has `anchor "focusd-block-steam"` + load anchor
  #   3. (optional) /etc/sudoers.d/focusd-network-block grants pfctl
  # See plugins/network-block/README.md.
  - id: network-block-reconcile
    plugin: network-block
    enabled: true
    schedule: "@every 30m"
    timeout: 60s
    retry: 1
    allow_overlap: false
    config:
      anchor: "focusd-block-steam"
      table: "steam_ips"
      # Comprehensive Steam/Valve domain set. Mirrored from the
      # canonical list in plugins/dns-block/internal/reconciler/data/
      # steam.txt — keep both in sync; that file is the source of truth.
      # 50+ domains covers: Steam main, Community, all CDN families
      # (Akamai + Cloudflare), Dota 2, Counter-Strike, other Valve
      # games, Valve corporate. Reconciler will hit each every 30m and
      # populate the pf table; expect ~100+ IPs once the resolver
      # spreads across all CDN A-records.
      domains:
        # Steam main
        - steampowered.com
        - www.steampowered.com
        - store.steampowered.com
        - api.steampowered.com
        - partner.steampowered.com
        - help.steampowered.com
        - support.steampowered.com
        - login.steampowered.com
        - account.steampowered.com
        - checkout.steampowered.com
        - community.steampowered.com
        - media.steampowered.com
        # Steam Community
        - steamcommunity.com
        - www.steamcommunity.com
        - store.steamcommunity.com
        - api.steamcommunity.com
        - forums.steamcommunity.com
        - groups.steamcommunity.com
        # Steam CDN / static / game content
        - steamstatic.com
        - cdn.akamai.steamstatic.com
        - cdn.cloudflare.steamstatic.com
        - community.akamai.steamstatic.com
        - community.cloudflare.steamstatic.com
        - store.akamai.steamstatic.com
        - store.cloudflare.steamstatic.com
        - shared.akamai.steamstatic.com
        - shared.cloudflare.steamstatic.com
        - avatars.akamai.steamstatic.com
        - avatars.cloudflare.steamstatic.com
        - video.akamai.steamstatic.com
        - video.cloudflare.steamstatic.com
        - clientconfig.akamai.steamstatic.com
        - steamcontent.com
        - steamuserimages-a.akamaihd.net
        - steambroadcast.akamaized.net
        - broadcast.akamai.steamstatic.com
        - broadcast.cloudflare.steamstatic.com
        # Dota 2
        - dota2.com
        - www.dota2.com
        - store.dota2.com
        - esports.dota2.com
        - dota.com
        - www.dota.com
        # Counter-Strike
        - counter-strike.net
        - www.counter-strike.net
        - store.counter-strike.net
        - play.counter-strike.net
        # Other Valve games
        - teamfortress.com
        - www.teamfortress.com
        - left4dead.com
        - portal2.com
        - half-life.com
        - artifactgame.com
        - underlords.com
        # Valve corporate
        - valvesoftware.com
        - www.valvesoftware.com
        - support.valvesoftware.com
      resolver: "https://cloudflare-dns.com/dns-query"

services: []
