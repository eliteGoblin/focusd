version: 2

project_name: appmon

builds:
  - id: appmon
    main: ./cmd/appmon
    binary: appmon
    # SQLCipher (encrypted registry) requires CGO. Matches the Makefile's
    # CGO_ENABLED=1 build line — without this, goreleaser defaults to
    # CGO_ENABLED=0 and fails with "undefined: sqlcipher.ErrBusy".
    env:
      - CGO_ENABLED=1
    # arm64 only for now. Adding amd64 requires CGO cross-compile setup
    # (SDKROOT + CC=clang -arch x86_64) because SQLCipher needs CGO, and
    # we can't naively cross-compile CGO from an arm64 GitHub Actions
    # runner to darwin/amd64. Modern Macs are arm64; users on Intel Macs
    # can build from source via `make build` until we wire up the
    # cross-compile.
    goos:
      - darwin
    goarch:
      - arm64
    ldflags:
      - -s -w
      - -X main.Version={{.Version}}
      - -X main.Commit={{.Commit}}
      - -X main.BuildTime={{.Date}}

archives:
  - id: appmon
    builds:
      - appmon
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^ci:'
      - Merge pull request
      - Merge branch

release:
  github:
    owner: eliteGoblin
    name: focusd
  draft: false
  prerelease: auto
  name_template: "appmon {{.Version}}"
