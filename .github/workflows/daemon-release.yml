name: Daemon Release

# Tag push like `daemon-v1.0.0` (or manual) → build the daemon for
# macOS arm64+amd64, Ed25519-sign each with the offline key (from the
# repo secret), and publish a GitHub Release. The daemon's self-update
# downloads the verified signed asset from these releases.
on:
  push:
    tags: ['daemon-v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'release tag (e.g. daemon-v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Resolve tag
        id: t
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Build + sign (darwin arm64/amd64)
        working-directory: daemon
        env:
          FOCUSD_ED25519_PRIVATE_KEY: ${{ secrets.FOCUSD_ED25519_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "$FOCUSD_ED25519_PRIVATE_KEY" || { echo "missing signing secret"; exit 1; }
          go build -o /tmp/focusd-sign ./cmd/focusd-sign
          mkdir -p /tmp/out
          V="${{ steps.t.outputs.tag }}"
          for arch in arm64 amd64; do
            CGO_ENABLED=0 GOOS=darwin GOARCH=$arch \
              go build -trimpath -ldflags "-s -w -X main.version=$V" \
              -o /tmp/daemon-$arch ./cmd/daemon
            /tmp/focusd-sign -in /tmp/daemon-$arch -out /tmp/out/daemon-darwin-$arch
          done
          ( cd /tmp/out && shasum -a 256 daemon-darwin-* > checksums.txt )
          ls -l /tmp/out

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.t.outputs.tag }}" \
            --title "${{ steps.t.outputs.tag }}" \
            --notes "Signed daemon release (Ed25519). Verified by the embedded public key." \
            /tmp/out/daemon-darwin-arm64 /tmp/out/daemon-darwin-amd64 /tmp/out/checksums.txt
